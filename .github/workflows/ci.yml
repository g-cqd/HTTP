name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SCRATCH: /tmp/swiftpm-build/HTTP

jobs:
  # ---------------------------------------------------------------------------
  # Style & safety gates: native swift-format + SwiftLint (force-unwrap/cast/try).
  # ---------------------------------------------------------------------------
  lint:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Toolchain
        run: swift --version
      - name: swift-format (strict)
        run: swift format lint --strict --recursive Sources Tests Package.swift
      - name: SwiftLint (strict)
        run: |
          brew list swiftlint >/dev/null 2>&1 || brew install swiftlint
          swiftlint lint --strict

  # ---------------------------------------------------------------------------
  # Build + full test suite. Warnings-as-errors is enabled via HTTP_WARNINGS_AS_ERRORS, which the
  # manifest scopes to OUR targets only (using .treatAllWarnings) — keeping the package reuse-safe
  # and avoiding the -suppress-warnings conflict that a global -Xswiftc flag hits on dependencies.
  # ---------------------------------------------------------------------------
  build-test:
    runs-on: macos-26
    env:
      HTTP_WARNINGS_AS_ERRORS: "1"
    steps:
      - uses: actions/checkout@v4
      - name: Toolchain
        run: swift --version
      - name: Build (warnings as errors)
        run: swift build --scratch-path "$SCRATCH"
      - name: Test (with coverage)
        run: swift test --scratch-path "$SCRATCH" --enable-code-coverage

  # ---------------------------------------------------------------------------
  # Hard constraint (CLAUDE.md): SwiftNIO MUST NOT appear in the dependency graph.
  # ---------------------------------------------------------------------------
  no-swiftnio:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Assert no SwiftNIO transitive dependency
        run: |
          deps="$(swift package show-dependencies --format flatlist 2>/dev/null || true)"
          echo "$deps"
          if printf '%s\n' "$deps" | grep -iE 'swift-nio|/nio'; then
            echo "::error::SwiftNIO present in the dependency graph — forbidden by CLAUDE.md"
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # Data-race & memory checks. Parsers must stay clean under ASan/TSan.
  # ---------------------------------------------------------------------------
  sanitizers:
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [address, thread]
    steps:
      - uses: actions/checkout@v4
      - name: Test under ${{ matrix.sanitizer }} sanitizer
        run: swift test --scratch-path "$SCRATCH" --sanitize=${{ matrix.sanitizer }}

  # ---------------------------------------------------------------------------
  # Benchmark smoke run (ordo-one/package-benchmark, isolated in Benchmarks/). Non-gating: it guards
  # against the harness failing to build or a benchmark crashing — not perf drift (runner noise is
  # too high to gate on). Promote to a `benchmark baseline check` once a runner baseline is captured.
  # ---------------------------------------------------------------------------
  benchmarks:
    runs-on: macos-26
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Toolchain
        run: swift --version
      - name: Benchmark smoke (build + run)
        run: swift package --package-path Benchmarks --disable-sandbox benchmark

# NOTE: jobs run on the `macos-26` image with the Swift 6.4 development toolchain. If a specific 6.4
# snapshot is needed beyond the image default, install it as the first step of each job with swiftly
# (`swiftly install 6.4-snapshot --use`). `h2spec` conformance and fuzz smoke runs are added as their
# milestones land (M7/M8); the benchmark smoke job is wired above.
