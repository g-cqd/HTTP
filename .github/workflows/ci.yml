name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SCRATCH: /tmp/swiftpm-build/HTTP

jobs:
  # ---------------------------------------------------------------------------
  # Style & safety gates: native swift-format + SwiftLint (force-unwrap/cast/try).
  # ---------------------------------------------------------------------------
  lint:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Toolchain
        run: swift --version
      - name: swift-format (strict)
        run: swift format lint --strict --recursive Sources Tests Package.swift
      - name: SwiftLint (strict)
        run: |
          brew list swiftlint >/dev/null 2>&1 || brew install swiftlint
          swiftlint lint --strict

  # ---------------------------------------------------------------------------
  # Build + full test suite. Warnings-as-errors is enabled via HTTP_WARNINGS_AS_ERRORS, which the
  # manifest scopes to OUR targets only (using .treatAllWarnings) — keeping the package reuse-safe
  # and avoiding the -suppress-warnings conflict that a global -Xswiftc flag hits on dependencies.
  # ---------------------------------------------------------------------------
  build-test:
    runs-on: macos-26
    env:
      HTTP_WARNINGS_AS_ERRORS: "1"
    steps:
      - uses: actions/checkout@v4
      - name: Install Swift 6.4 dev toolchain (no hosted macOS image ships 6.4)
        uses: g-cqd/ADBuildTools/.github/actions/setup-swift@v1
      - name: Toolchain
        run: swift --version
      - name: Build (warnings as errors)
        run: swift build --scratch-path "$SCRATCH"
      - name: Test (with coverage)
        run: swift test --scratch-path "$SCRATCH" --enable-code-coverage
      # Coverage gate. SwiftPM emits a per-target .xctest bundle, so a single-binary llvm-cov export
      # under-reports the modules that bundle does not link; merging the merged profdata across every
      # bundle gives the true Sources line coverage. Threshold 85% (Sources are ~92% today) — a floor
      # against a module losing its tests, with headroom for normal churn; raise it as coverage grows.
      - name: Coverage gate (Sources lines ≥ 85%)
        run: |
          set -euo pipefail
          prof="$(find "$SCRATCH" -name default.profdata | head -1)"
          bins=()
          while IFS= read -r b; do bins+=("$b/Contents/MacOS/$(basename "$b" .xctest)"); done < <(find "$SCRATCH" -name "*.xctest" -type d)
          objs=("${bins[0]}"); for o in "${bins[@]:1}"; do objs+=(-object "$o"); done
          xcrun llvm-cov export -format=text -instr-profile="$prof" -ignore-filename-regex="Tests/|[.]build/|Benchmarking/|checkouts/" "${objs[@]}" > cov.json
          python3 -c "import json,sys; p=json.load(open('cov.json'))['data'][0]['totals']['lines']['percent']; print('Sources line coverage: %.2f%%' % p); sys.exit(0 if p>=85 else 1)" || { echo '::error::Sources line coverage is below the 85% threshold'; exit 1; }

  # ---------------------------------------------------------------------------
  # Release-mode test lane: optimized build + full suite, catching optimizer-only and release-assert
  # behavior the debug run misses (also the configuration the perf numbers + h2spec use).
  # ---------------------------------------------------------------------------
  release-test:
    runs-on: macos-26
    env:
      HTTP_WARNINGS_AS_ERRORS: "1"
    steps:
      - uses: actions/checkout@v4
      - name: Install Swift 6.4 dev toolchain (no hosted macOS image ships 6.4)
        uses: g-cqd/ADBuildTools/.github/actions/setup-swift@v1
      - name: Toolchain
        run: swift --version
      - name: Test (release)
        run: swift test -c release --scratch-path "$SCRATCH"

  # ---------------------------------------------------------------------------
  # Hard constraint (CLAUDE.md): SwiftNIO MUST NOT appear in the dependency graph.
  # ---------------------------------------------------------------------------
  no-swiftnio:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Install Swift 6.4 dev toolchain (no hosted macOS image ships 6.4)
        uses: g-cqd/ADBuildTools/.github/actions/setup-swift@v1
      - name: Assert no SwiftNIO transitive dependency
        run: |
          deps="$(swift package show-dependencies --format flatlist 2>/dev/null || true)"
          echo "$deps"
          if printf '%s\n' "$deps" | grep -iE 'swift-nio|/nio'; then
            echo "::error::SwiftNIO present in the dependency graph — forbidden by CLAUDE.md"
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # Trap-surface gate. The request path must stay free of process-aborting traps, so one bad request
  # can never crash the whole server (the in-process half of crash defense; prefork covers app traps).
  # SwiftLint already gates try!/as!/force-unwrap; this covers fatalError/precondition/assertionFailure
  # /.unsafelyUnwrapped, which abort in release.
  # ---------------------------------------------------------------------------
  trap-lint:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Assert the request path is trap-free
        run: |
          targets="Sources/Core/HTTPCore Sources/Protocols/HTTP1 Sources/Protocols/HTTP2 Sources/Protocols/HPACK Sources/Protocols/QPACK Sources/Protocols/HTTP3 Sources/Protocols/WebSocket Sources/Server/HTTPServer Sources/Transport/HTTPTransport Sources/Core/HTTPConcurrency"
          pattern='(fatalError|preconditionFailure|assertionFailure)\(|(^|[^A-Za-z.])precondition\(|(^|[^A-Za-z])assert\(|\.unsafelyUnwrapped'
          hits="$(grep -rnE "$pattern" $targets --include='*.swift' 2>/dev/null | grep -vE '^[^:]+:[0-9]+:[[:space:]]*//' || true)"
          if [ -n "$hits" ]; then
            echo "$hits"
            echo "::error::process-aborting trap in the request path — one bad request must not crash the server"
            exit 1
          fi
          echo "request path is trap-free"

  # ---------------------------------------------------------------------------
  # RFC-citation gate. CLAUDE.md: "Always reference RFC/ISO/Norms/Standards/CVE". Every wire
  # parser/decoder must cite the standard it implements, so the normative basis for a parse stays in the
  # source rather than tribal knowledge. Presence-only (a citation exists in the file), not a
  # correctness claim — but it makes "which RFC?" un-skippable in review for the files that parse bytes.
  # ---------------------------------------------------------------------------
  rfc-citations:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Assert wire parsers/decoders cite their standard
        run: |
          set -euo pipefail
          missing=""
          while IFS= read -r f; do
            grep -qE 'RFC[[:space:]]*[0-9]|§|CVE-|ISO[[:space:]/]' "$f" || missing+="$f"$'\n'
          done < <(find Sources/Protocols Sources/Core/HTTPCore \( -name '*Parser.swift' -o -name '*Decoder.swift' \) | sort)
          if [ -n "$missing" ]; then
            printf '%s\n' "$missing"
            echo "::error::a wire parser/decoder cites no RFC/§/CVE/ISO standard — reference the norm it implements"
            exit 1
          fi
          echo "every wire parser/decoder cites its standard"

  # ---------------------------------------------------------------------------
  # Data-race & memory checks. Parsers must stay clean under ASan/TSan.
  # ---------------------------------------------------------------------------
  sanitizers:
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [address, thread]
    steps:
      - uses: actions/checkout@v4
      - name: Install Swift 6.4 dev toolchain (no hosted macOS image ships 6.4)
        uses: g-cqd/ADBuildTools/.github/actions/setup-swift@v1
      - name: Test under ${{ matrix.sanitizer }} sanitizer
        run: swift test --scratch-path "$SCRATCH" --sanitize=${{ matrix.sanitizer }}

  # ---------------------------------------------------------------------------
  # Optional-feature manifest paths the DEFAULT graph never compiles, so a regression in them is
  # otherwise invisible until a downstream first opts in: the portable libssl-over-POSIX TLS backbone
  # (HTTP_PORTABLE_TLS — C++ interop + the vendored BoringSSL build) and the Zstandard content coding
  # (HTTP_ZSTD — the libzstd shim, Homebrew-prefix path). These are the most fragile manifest branches;
  # build them under warnings-as-errors so a manifest or shim break is caught here. (The Linux zstd path
  # is exercised by codings-linux; this is the macOS Homebrew-prefix path plus the TLS backbone, which
  # has no CI lane at all. Running the gated suites — only compiled under these flags — is a follow-up.)
  # ---------------------------------------------------------------------------
  optional-features:
    runs-on: macos-26
    env:
      HTTP_WARNINGS_AS_ERRORS: "1"
    steps:
      - uses: actions/checkout@v4
      - name: Install Swift 6.4 dev toolchain (no hosted macOS image ships 6.4)
        uses: g-cqd/ADBuildTools/.github/actions/setup-swift@v1
      - name: Toolchain
        run: swift --version
      - name: Build — portable libssl TLS (HTTP_PORTABLE_TLS)
        env:
          HTTP_PORTABLE_TLS: "1"
        run: swift build --scratch-path "$SCRATCH/opt-tls"
      - name: Build — Zstandard coding (HTTP_ZSTD)
        env:
          HTTP_ZSTD: "1"
          HTTP_ZSTD_PREFIX: /opt/homebrew/opt/zstd
        run: |
          brew list zstd >/dev/null 2>&1 || brew install zstd
          swift build --scratch-path "$SCRATCH/opt-zstd"

  # ---------------------------------------------------------------------------
  # Linux (G0). The sans-I/O engines + server runtime run on Linux over the epoll backbone; these jobs
  # build and run the full suite in the official Swift container on ubuntu-latest (locally reproduced by
  # scripts/linux-test.sh via apple/container). HTTP_WARNINGS_AS_ERRORS is intentionally off here:
  # swift-crypto's NIST-curve keys are not Sendable on Linux (CryptoKit's are), so HTTPAuth emits
  # @preconcurrency warnings the Apple build does not — re-enable once those are addressed. HTTP/3/QUIC is
  # Network.framework-provided, so it (and its tests) is excluded from the Linux build graph.
  # ---------------------------------------------------------------------------
  build-test-linux:
    runs-on: ubuntu-latest
    container: swiftlang/swift:nightly-noble
    steps:
      - uses: actions/checkout@v4
      - name: Toolchain
        run: swift --version
      - name: Build
        run: swift build --scratch-path "$SCRATCH"
      - name: Test (full suite)
        run: swift test --scratch-path "$SCRATCH"

  release-test-linux:
    runs-on: ubuntu-latest
    container: swiftlang/swift:nightly-noble
    steps:
      - uses: actions/checkout@v4
      - name: Toolchain
        run: swift --version
      - name: Test (release)
        run: swift test -c release --scratch-path "$SCRATCH"

  sanitizers-linux:
    runs-on: ubuntu-latest
    container: swiftlang/swift:nightly-noble
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [address, thread]
    steps:
      - uses: actions/checkout@v4
      - name: Test under ${{ matrix.sanitizer }} sanitizer (Linux)
        run: swift test --scratch-path "$SCRATCH" --sanitize=${{ matrix.sanitizer }}

  # ---------------------------------------------------------------------------
  # Opt-in content codings on Linux (G0): Brotli (libbrotli) + zstd (libzstd), the system-lib codings the
  # default graph never links. apt-install the dev packages, then run the coding round-trip suites under
  # HTTP_BROTLI/HTTP_ZSTD (prefix /usr). gzip needs no flag — system zlib, covered by build-test-linux.
  # ---------------------------------------------------------------------------
  codings-linux:
    runs-on: ubuntu-latest
    container: swiftlang/swift:nightly-noble
    env:
      HTTP_BROTLI: "1"
      HTTP_BROTLI_PREFIX: /usr
      HTTP_ZSTD: "1"
      HTTP_ZSTD_PREFIX: /usr
    steps:
      - uses: actions/checkout@v4
      - name: Install libbrotli + libzstd
        run: apt-get update -qq && apt-get install -y -qq libbrotli-dev libzstd-dev
      - name: Coding round-trips (Brotli + zstd + Linux gzip/inflate)
        run: swift test --scratch-path "$SCRATCH" --filter "CBrotli|Zstd|GzipLinux|InflateLinux"

  # ---------------------------------------------------------------------------
  # Benchmark smoke run (ordo-one/package-benchmark, isolated in Benchmarking/Benchmarks/). Non-gating: it guards
  # against the harness failing to build or a benchmark crashing — not perf drift (runner noise is
  # too high to gate on). Promote to a `benchmark baseline check` once a runner baseline is captured.
  # ---------------------------------------------------------------------------
  benchmarks:
    runs-on: macos-26
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install Swift 6.4 dev toolchain (no hosted macOS image ships 6.4)
        uses: g-cqd/ADBuildTools/.github/actions/setup-swift@v1
      - name: Toolchain
        run: swift --version
      - name: Benchmark smoke (build + run)
        run: swift package --package-path Benchmarking/Benchmarks --disable-sandbox benchmark

  # ---------------------------------------------------------------------------
  # HTTP/2 conformance — h2spec (RFC 9113) against the live httpd-example over h2c. Gates on the
  # sections that pass 100% (frame format, streams & multiplexing, frame definitions, GOAWAY, message
  # exchanges, HPACK). Only the invalid-preface case (generic/http2-3, a benign h2c/HTTP-1 ambiguity) is
  # excluded — see Docs/Standards/CONFORMANCE.md. The hard `timeout` turns any future hang into a failure.
  # ---------------------------------------------------------------------------
  h2spec:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Install Swift 6.4 dev toolchain (no hosted macOS image ships 6.4)
        uses: g-cqd/ADBuildTools/.github/actions/setup-swift@v1
      - name: Install h2spec
        run: brew list h2spec >/dev/null 2>&1 || brew install h2spec
      - name: Build example server (release)
        run: swift build -c release --product httpd-example --scratch-path "$SCRATCH"
      - name: h2spec — core sections (h2c)
        run: |
          BIN="$(swift build -c release --product httpd-example --scratch-path "$SCRATCH" --show-bin-path)/httpd-example"
          HTTPD_MAX_CONN=100000 "$BIN" 18080 posixKqueue >/tmp/httpd.log 2>&1 &
          PID=$!
          # Wait for the listener via an h2c prior-knowledge probe (up to 20s).
          for _ in $(seq 1 40); do
            if curl -s --http2-prior-knowledge --max-time 1 -o /dev/null http://127.0.0.1:18080/; then
              break
            fi
            sleep 0.5
          done
          set +e
          timeout 120 h2spec -h 127.0.0.1 -p 18080 --timeout 3 http2/4 http2/5 http2/6 http2/7 http2/8 hpack
          rc=$?
          set -e
          kill "$PID" 2>/dev/null || true
          exit $rc

  # ---------------------------------------------------------------------------
  # WebSocket conformance — the Autobahn TestSuite (RFC 6455) fuzzingclient against httpd-example's /ws
  # echo. ubuntu-latest has Docker (the macOS image does not — why this was deferred): the server runs in
  # the Swift container on the host network, Autobahn runs as its own container against it. Non-gating
  # (continue-on-error) until observed green on CI, then promote. CI-only — not locally reproducible here
  # (no Docker on the dev machine). Config + report gate: .github/conformance/autobahn/.
  # ---------------------------------------------------------------------------
  autobahn:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Start httpd-example (/ws echo) in the Swift container, host network
        run: |
          docker run -d --name httpd --network host -v "$PWD:/work" -w /work \
            swiftlang/swift:nightly-noble \
            bash -lc 'swift build -c release --product httpd-example --scratch-path /tmp/bld \
              && exec /tmp/bld/release/httpd-example 9001 posixEpoll'
          # Wait (covering the in-container release build) for the WebSocket listener.
          for _ in $(seq 1 90); do
            curl -s -o /dev/null --max-time 1 http://127.0.0.1:9001/ && break
            sleep 2
          done
      - name: Run the Autobahn fuzzingclient
        run: |
          mkdir -p reports
          docker run --rm --network host \
            -v "$PWD/.github/conformance/autobahn:/config:ro" \
            -v "$PWD/reports:/reports" \
            crossbario/autobahn-testsuite \
            wstest -m fuzzingclient -s /config/fuzzingclient.json
      - name: Gate the report (no FAILED cases)
        run: python3 .github/conformance/autobahn/check.py reports/index.json
      - name: Stop the server
        if: always()
        run: docker rm -f httpd || true

# NOTE: jobs run on the `macos-26` image with the Swift 6.4 development toolchain. If a specific 6.4
# snapshot is needed beyond the image default, install it as the first step of each job with swiftly
# (`swiftly install 6.4-snapshot --use`). The seeded fuzz suites (.tags(.fuzz)) run inside build-test
# and under the ASan/TSan matrix above — no separate lane needed.
#
# Tracked follow-ups (each blocked on a specific item, see Docs/Standards/CONFORMANCE.md):
#   • The streams section (http2/5) is now gated — the 5.1.2 hang and the 5.1.12 closed-stream nuance
#     are fixed. Only generic/http2-3 stay out, for the invalid-preface GOAWAY (a benign ambiguity).
#   • Autobahn (WebSocket, RFC 6455) — needs the crossbario/autobahn-testsuite Docker image; the CI
#     image has no Docker. In-house WebSocket + WebSocketFuzzTests cover framing/masking/close/UTF-8.
#   • Benchmark baseline gate — capture a runner baseline, then promote the smoke job to a check.
#   • UBSan (-sanitize=undefined) — the UBSan runtime fails to link the test bundles on the current
#     6.4 toolchain; revisit when the toolchain ships a linkable UBSan runtime.
