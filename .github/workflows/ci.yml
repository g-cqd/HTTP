name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SCRATCH: /tmp/swiftpm-build/HTTP

jobs:
  # ---------------------------------------------------------------------------
  # Style & safety gates: native swift-format + SwiftLint (force-unwrap/cast/try).
  # ---------------------------------------------------------------------------
  lint:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Toolchain
        run: swift --version
      - name: swift-format (strict)
        run: swift format lint --strict --recursive Sources Tests Package.swift
      - name: SwiftLint (strict)
        run: |
          brew list swiftlint >/dev/null 2>&1 || brew install swiftlint
          swiftlint lint --strict

  # ---------------------------------------------------------------------------
  # Build (warnings-as-errors, enforced here rather than via unsafe manifest flags
  # so the package stays usable as a versioned dependency) + full test suite.
  # ---------------------------------------------------------------------------
  build-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Toolchain
        run: swift --version
      - name: Build (warnings as errors)
        run: swift build --scratch-path "$SCRATCH" -Xswiftc -warnings-as-errors
      - name: Test
        run: swift test --scratch-path "$SCRATCH"

  # ---------------------------------------------------------------------------
  # Hard constraint (CLAUDE.md): SwiftNIO MUST NOT appear in the dependency graph.
  # ---------------------------------------------------------------------------
  no-swiftnio:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Assert no SwiftNIO transitive dependency
        run: |
          deps="$(swift package show-dependencies --format flatlist 2>/dev/null || true)"
          echo "$deps"
          if printf '%s\n' "$deps" | grep -iE 'swift-nio|/nio'; then
            echo "::error::SwiftNIO present in the dependency graph — forbidden by CLAUDE.md"
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # Data-race & memory checks. Parsers must stay clean under ASan/TSan.
  # ---------------------------------------------------------------------------
  sanitizers:
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [address, thread]
    steps:
      - uses: actions/checkout@v4
      - name: Test under ${{ matrix.sanitizer }} sanitizer
        run: swift test --scratch-path "$SCRATCH" --sanitize=${{ matrix.sanitizer }}

# NOTE: jobs assume the runner provides the Swift 6.4 toolchain (pin via xcode-select or the
# swiftlang toolchain installer once 6.4 ships in a stable image). Benchmarks (package-benchmark),
# fuzz smoke runs, and `h2spec` conformance are added as their milestones land (M5/M7/M8).
