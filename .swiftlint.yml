# SwiftLint configuration for `HTTP`.
#
# The bundled `swift format lint` is the PRIMARY style/lint gate. SwiftLint is layered on top to
# hard-enforce the non-negotiable safety rules from CLAUDE.md: no force-unwrap, no force-cast,
# no force-try, no implicitly-unwrapped optionals. `only_rules` keeps it fast and focused.

only_rules:
  # Main Rules
  - attribute_name_spacing
  - blanket_disable_command
  - closing_brace
  - colon
  - comma
  - comment_spacing
  - compiler_protocol_init
  - control_statement
  - cyclomatic_complexity
  - duplicate_conditions
  - duplicate_enum_cases
  - duplicate_imports
  - duplicated_key_in_dictionary_literal
  - empty_enum_arguments
  - empty_parameters
  - empty_parentheses_with_trailing_closure
  - file_length
  - for_where
  - force_cast
  - force_try
  - force_unwrapping
  - implicit_getter
  - invalid_swiftlint_command
  - invisible_character
  - is_disjoint
  - line_length
  - multiple_closures_with_trailing_closure
  - nesting
  - no_fallthrough_only
  - no_space_in_method_call
  - non_optional_string_data_conversion
  - optional_data_string_conversion
  - prefer_type_checking
  - private_over_fileprivate
  - protocol_property_accessors_order
  - reduce_boolean
  - redundant_discardable_let
  - redundant_sendable
  - redundant_set_access_control
  - redundant_string_enum_value
  - redundant_void_return
  - return_arrow_whitespace
  - shorthand_operator
  - static_over_final_class
  - superfluous_disable_command
  - switch_case_alignment
  - syntactic_sugar
  - trailing_comma
  - trailing_newline
  - trailing_semicolon
  - trailing_whitespace
  - unneeded_break_in_switch
  - unneeded_override
  - unneeded_synthesized_initializer
  - unused_closure_parameter
  - unused_control_flow_label
  - unused_enumerated
  - unused_optional_binding
  - vertical_parameter_alignment
  - vertical_whitespace
  - void_function_in_ternary
  - void_return               
  # Analyzer Rules
  - capture_variable
  - typesafe_array_init
  - unused_declaration
  - unused_import
  # Secondary Rules
  - array_init
  - attributes
  - closure_body_length
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - comma_inheritance
  - conditional_returns_on_newline
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - convenience_type
  - direct_return
  - empty_collection_literal
  - empty_count
  - empty_string
  - explicit_init
  - fatal_error_message
  - file_name_no_space
  - file_types_order
  - first_where
  - flatmap_over_map_reduce
  - identical_operands
  - implicit_return
  - implicitly_unwrapped_optional
  - indentation_width
  - last_where
  - legacy_objc_type
  - let_var_whitespace
  - literal_expression_end_indentation
  - local_doc_comment
  - lower_acl_than_parent
  - modifier_order
  - multiline_arguments
  - multiline_arguments_brackets
  - multiline_call_arguments
  - multiline_function_chains
  - multiline_literal_brackets
  - multiline_parameters
  - multiline_parameters_brackets
  - no_empty_block
  - no_grouping_extension
  - non_overridable_class_declaration
  - number_separator
  - object_literal
  - one_declaration_per_file
  - operator_usage_whitespace
  - optional_enum_case_matching
  - period_spacing
  - prefer_condition_list
  - prefer_key_path
  - prefer_self_in_static_references
  - prefer_self_type_over_type_of_self
  - prefer_zero_over_explicit_init
  - raw_value_for_camel_cased_codable_enum
  - reduce_into
  - redundant_final
  - redundant_nil_coalescing
  - redundant_self
  - redundant_type_annotation
  - required_deinit
  - required_enum_case
  - return_value_from_void_function
  - shorthand_optional_binding
  - sorted_first_last
  - sorted_imports
  - static_operator
  - strict_fileprivate
  - superfluous_else
  - switch_case_on_newline
  - trailing_closure
  - unavailable_function
  - unhandled_throwing_task
  - unneeded_escaping
  - unneeded_parentheses_in_closure_argument
  - unneeded_throws_rethrows
  - unowned_variable_capture
  - untyped_error_in_catch
  - unused_parameter
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces
  - yoda_condition

strict: true                  # any violation fails CI

attributes:
  always_on_same_line: ["@IBAction", "@NSManaged", "@objc", "@testable", "@State", "@Binding", "@Environment", "@Published"]
  always_on_line_above: ["@MainActor", "@Observable", "@Sendable", "@available", "@discardableResult", "@frozen", "@inlinable", "@inlineable", "@nonobjc", "@objcMembers", "@propertyWrapper", "@resultBuilder", "@usableFromInline", "@Tag"]
force_unwrapping:
  severity: error
force_cast:
  severity: error
force_try:
  severity: error
implicitly_unwrapped_optional:
  severity: error
closure_body_length:
  warning: 40
  error: 60
cyclomatic_complexity:
  warning: 12
  error: 15                   # complexity of 15+ fails — enforces "< 15"
file_length:
  warning: 400                # files over 400 lines fail (strict) — enforces the CLAUDE.md cap
  error: 600                  # hard ceiling even with a justified `// swiftlint:disable file_length`
  ignore_comment_only_lines: true  # the RFC-citation headers/doc comments don't count toward code size
line_length:
  warning: 120
  error: 140
  ignores_multiline_strings: true
nesting:
  ignore_typealiases_and_associatedtypes: true
  ignore_coding_keys: true
redundant_discardable_let:
  ignore_swiftui_view_bodies: true
switch_case_alignment:
  indented_cases: true
trailing_comma:
  mandatory_comma: false
# Secondary Rules
prefer_key_path:
  restrict_to_standard_functions: false
unused_import:
  require_explicit_imports: true

included:
  - Sources
  - Tests
  - Package.swift

excluded:
  - .build
  - Benchmarking  # throwaway load-test comparison subjects (own SwiftPM package), not library code
