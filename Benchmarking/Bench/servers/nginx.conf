# Benchmarking/Bench/servers/nginx.conf — the C throughput/latency ceiling, mirroring httpd-example's routes.
#
# We compare framing + I/O throughput on identical tiny/static responses, not features. Run via:
#   nginx -c <abs path>/nginx.conf -g 'daemon off;'
# Listens on 8081 (matches Benchmarking/Bench/run.sh PORT_NGINX). Logging is off so the disk is never the bottleneck.

worker_processes  auto;
error_log         /dev/null crit;
pid               /tmp/http-bench-nginx.pid;

events {
    worker_connections  8192;
    multi_accept        on;
}

http {
    access_log   off;
    tcp_nodelay  on;     # the same Nagle-off posture our P1 transport work adds
    tcp_nopush   off;
    keepalive_requests  1000000;
    keepalive_timeout   75s;

    server {
        listen  8081  reuseport  backlog=4096;

        location = / {
            default_type  text/plain;
            return 200 "Hello from the nginx baseline.\n";
        }
        location = /health {
            default_type  text/plain;
            return 200 "OK\n";
        }
        # Parity routes (the heavier-workload scenarios). nginx cannot echo a POST body without a
        # scripting module, so it does not implement /echo — the harness marks that cell N/A.
        location = /json {
            default_type  application/json;
            return 200 '{"message":"Hello, World!"}';
        }
        location = /payload {
            default_type  text/plain;
            return 200 "__PAYLOAD__";   # 1 KiB, filled in by run.sh
        }
        location ~ ^/hello/(?<name>.+)$ {
            default_type  text/plain;
            return 200 "Hello, $name!\n";
        }
    }
}
