# Benchmarking/Bench/servers/nginx-tls.conf — nginx as the HTTP/2-over-TLS ceiling (template).
#
# Used by Benchmarking/Bench/run.sh when HTTP2=1: the harness copies this file, substitutes __CERT__/__KEY__ with a
# generated self-signed cert, and launches nginx with it. The cleartext counterpart is nginx.conf.
# Mirrors httpd-example's routes; ALPN advertises h2 so `oha --http2` negotiates HTTP/2.

worker_processes  auto;
error_log         /dev/null crit;
pid               /tmp/http-bench-nginx-tls.pid;

events {
    worker_connections  8192;
    multi_accept        on;
}

http {
    access_log   off;
    tcp_nodelay  on;
    keepalive_requests  1000000;
    keepalive_timeout   75s;

    server {
        listen  8081  ssl  reuseport  backlog=4096;
        http2   on;

        ssl_certificate      __CERT__;
        ssl_certificate_key  __KEY__;
        ssl_session_cache    shared:BENCH:16m;  # amortize the handshake across keepalive connections

        location = / {
            default_type  text/plain;
            return 200 "Hello from the nginx baseline.\n";
        }
        location = /health {
            default_type  text/plain;
            return 200 "OK\n";
        }
    }
}
